<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#065bf9",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f1623",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Header -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-4 lg:px-40">
<div class="flex items-center gap-4 text-primary">
<div class="size-8">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-black leading-tight tracking-tight">Ozon</h2>
</div>
<div class="flex items-center gap-2">
<span class="text-slate-500 dark:text-slate-400 text-sm hidden sm:block">Уже есть аккаунт?</span>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 border border-primary text-primary hover:bg-primary/5 transition-colors text-sm font-bold">
<span>Войти</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex flex-1 justify-center py-10 px-4">
<div class="layout-content-container flex flex-col max-w-[520px] w-full bg-white dark:bg-slate-900 p-8 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<div class="flex flex-col gap-2 mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-black leading-tight tracking-tight">Регистрация</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">Создайте профиль, чтобы делать покупки и отслеживать заказы</p>
</div>
<form class="flex flex-col gap-5">
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<!-- Имя -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Имя</label>
<input class="flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 px-4 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Иван" type="text"/>
</div>
<!-- Фамилия -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Фамилия</label>
<input class="flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 px-4 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Иванов" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Электронная почта</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 pl-11 pr-4 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="example@mail.ru" type="email"/>
</div>
</div>
<!-- Телефон -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Номер телефона</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">phone_iphone</span>
<input class="flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 pl-11 pr-4 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="+7 (900) 000-00-00" type="tel"/>
</div>
</div>
<!-- Пароль -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Пароль</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 pl-11 pr-12 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Минимум 8 символов" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Подтверждение пароля -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Подтвердите пароль</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">check_circle</span>
<input class="flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 pl-11 pr-4 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Повторите ваш пароль" type="password"/>
</div>
</div>
<!-- Согласие -->
<div class="flex items-start gap-3 mt-2">
<input checked="" class="mt-1 h-5 w-5 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="text-sm text-slate-500 dark:text-slate-400 leading-tight" for="terms">
                                Я соглашаюсь с <a class="text-primary hover:underline" href="#">условиями использования</a> и <a class="text-primary hover:underline" href="#">политикой конфиденциальности</a>
</label>
</div>
<!-- Кнопка регистрации -->
<button class="flex w-full cursor-pointer items-center justify-center rounded-lg h-14 bg-primary text-white text-base font-bold leading-normal tracking-wide hover:bg-blue-700 transition-colors shadow-lg shadow-primary/20 mt-4" type="submit">
                            Зарегистрироваться
                        </button>
</form>
<!-- Разделитель -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-slate-200 dark:border-slate-800"></span>
</div>
<div class="relative flex justify-center text-sm">
<span class="bg-white dark:bg-slate-900 px-4 text-slate-400 uppercase font-medium">Или войти через</span>
</div>
</div>
<!-- Социальные сети -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 dark:border-slate-700 h-12 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-xl">account_circle</span>
<span class="text-sm font-medium">VK ID</span>
</button>
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 dark:border-slate-700 h-12 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-xl">google</span>
<span class="text-sm font-medium">Google</span>
</button>
</div>
<p class="text-center mt-8 text-slate-500 dark:text-slate-400 text-sm">
                        Уже зарегистрированы? 
                        <a class="text-primary font-bold hover:underline" href="#">Войти в аккаунт</a>
</p>
</div>
</main>
<!-- Footer -->
<footer class="py-6 px-4 text-center text-slate-400 text-xs">
<p>© 2024 Ozon. Все права защищены.</p>
</footer>
</div>
</div>
</body></html>
